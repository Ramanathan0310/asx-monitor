name: Master Engine - Weekly Briefing

on:
  schedule:
    # Saturday 8am AEST = Friday 22:00 UTC
    - cron: "0 22 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: master-engine
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip

      - name: Run Master Engine
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:    ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:      ${{ secrets.EMAIL_TO }}
        run: python master_engine.py

      - name: Commit report
        run: |
          git config user.name "master-engine-bot"
          git config user.email "master-engine-bot@users.noreply.github.com"
          git add reports/master_*.html || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Master Engine $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
