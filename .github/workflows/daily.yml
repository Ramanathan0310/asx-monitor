name: ASX Monitor — daily run

on:
  schedule:
    # GitHub Actions cron is UTC. AEST is UTC+10 (no DST).
    # 08:00 AEST = 22:00 UTC (previous day)
    # 18:30 AEST = 08:30 UTC (same day)
    - cron: "0 22 * * *"
    - cron: "30 8 * * *"

  # Manual trigger from the Actions tab (useful for testing / first run)
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "report"
        type: choice
        options:
          - report
          - seed

# Allow the workflow to commit state + reports back to the repo
permissions:
  contents: write

concurrency:
  group: asx-monitor-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: python -m playwright install --with-deps chromium

      - name: Install OS deps for Playwright (if cache hit skipped install)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: python -m playwright install-deps chromium

      - name: Run ASX Monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          MODE="${{ inputs.mode || 'report' }}"
          if [ "$MODE" = "seed" ]; then
            python monitor.py --seed
          else
            python monitor.py
          fi

      - name: Commit state + report back to repo
        run: |
          git config user.name "asx-monitor-bot"
          git config user.email "asx-monitor-bot@users.noreply.github.com"
          git add seen_announcements.json reports/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ASX monitor run $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
          fi
