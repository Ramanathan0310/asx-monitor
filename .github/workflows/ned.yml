name: Ned - News Digest

on:
  schedule:
    # Daily at 8:30am AEST = 22:30 UTC (previous day)
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ned-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests anthropic

      - name: Run Ned
        env:
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:       ${{ secrets.SMTP_HOST }}
          SMTP_PORT:       ${{ secrets.SMTP_PORT }}
          SMTP_USER:       ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:      ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:        ${{ secrets.EMAIL_TO }}
        run: python ned.py

      - name: Commit reports
        run: |
          git config user.name "ned-bot"
          git config user.email "ned-bot@users.noreply.github.com"
          git add reports/ned_*.json reports/ned_*.html || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Ned news digest $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
