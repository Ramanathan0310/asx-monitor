name: Results Pack Agent

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: "ASX ticker (e.g. WTC). Leave blank to scan all portfolio."
        required: false
        default: ""
      report_type:
        description: "Report type"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - HY
          - FY
      date:
        description: "Target date YYYY-MM-DD (optional)"
        required: false
        default: ""
      scan_days:
        description: "Days back to scan when no ticker given (default 7)"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: results-pack
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pypdf pdfplumber pymupdf pytesseract Pillow requests

      - name: Install Playwright
        run: python -m playwright install --with-deps chromium

      - name: Run Results Pack Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:         ${{ secrets.SMTP_HOST }}
          SMTP_PORT:         ${{ secrets.SMTP_PORT }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:        ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:          ${{ secrets.EMAIL_TO }}
        run: |
          TICKER="${{ inputs.ticker }}"
          RTYPE="${{ inputs.report_type }}"
          DATE="${{ inputs.date }}"
          DAYS="${{ inputs.scan_days || '7' }}"

          ARGS=""
          if [ -n "$TICKER" ]; then
            ARGS="--ticker $TICKER"
            if [ "$RTYPE" != "auto" ] && [ -n "$RTYPE" ]; then
              ARGS="$ARGS --report-type $RTYPE"
            fi
            if [ -n "$DATE" ]; then
              ARGS="$ARGS --date $DATE"
            fi
          else
            ARGS="--scan --days-back $DAYS"
          fi

          python results_pack_agent.py $ARGS

      - name: Commit results
        run: |
          git config user.name "results-pack-bot"
          git config user.email "results-pack-bot@users.noreply.github.com"
          git add results_packs/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Results pack $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
